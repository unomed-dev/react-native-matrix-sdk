---
crate:
  repo: https://github.com/matrix-org/matrix-rust-sdk
  rev: 742a0db07bde3afd049077e7962948111473e1e1 # matrix-sdk-base-0.16.0
  manifestPath: bindings/matrix-sdk-ffi/Cargo.toml
android:
  cargoExtras: ['--features', 'rustls-tls']
  directory: android
  native_bindings_dir: kotlin
  useSharedLibrary: true
  jniLibs: src/main/jniLibs
  targets:
    - arm64-v8a
    - armeabi-v7a
ios:
  cargoExtras: ['--features', 'rustls-tls']
  directory: ios
  native_bindings_dir: swift
  targets:
    - aarch64-apple-ios
    - aarch64-apple-ios-sim
    - x86_64-apple-ios
  xcodebuildExtras: []
  frameworkName: build/RnMatrixRustSdk
noOverwrite:
  - "android/build.gradle"
turboModule:
  cpp: cpp
  ts: src
bindings:
  cpp: cpp/generated
  ts: src/generated
