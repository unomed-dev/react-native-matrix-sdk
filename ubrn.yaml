---
crate:
  repo: https://github.com/WeissDev/matrix-rust-sdk
  rev: 0cd1ba9a1593715a28c0e849d90eb3c958bb867b # weissdev/state-events-ffi
  manifestPath: bindings/matrix-sdk-ffi/Cargo.toml
android:
  cargoExtras: ['--features', 'rustls-tls']
  directory: android
  native_bindings_dir: kotlin
  useSharedLibrary: true
  jniLibs: src/main/jniLibs
  targets:
    - arm64-v8a
    - armeabi-v7a
ios:
  cargoExtras: ['--features', 'rustls-tls']
  directory: ios
  native_bindings_dir: swift
  targets:
    - aarch64-apple-ios
    - aarch64-apple-ios-sim
    - x86_64-apple-ios
  xcodebuildExtras: []
  frameworkName: build/RnMatrixRustSdk
noOverwrite:
  - "android/build.gradle"
turboModule:
  cpp: cpp
  ts: src
bindings:
  cpp: cpp/generated
  ts: src/generated
